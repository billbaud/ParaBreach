<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ParaBreach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
  </div>

  <div id="hud">
    <div id="score">SCORE 000000</div>
    <div id="wave">WAVE 1</div>
    <div id="lives">TROOPERS 0</div>
    <div id="version">v.1.22</div>
  </div>

  <div id="help">Move pointer/finger to aim. Tap/click/hold to fire.</div>

  <div id="overlay" class="show">
    <div class="panel">
      <div class="splash-graphic">
        <svg viewBox="0 0 100 100" class="parachute">
          <path d="M10 40 C 10 10, 90 10, 90 40" />
          <path d="M10 40 C 30 50, 70 50, 90 40" />
          <line x1="15" y1="40" x2="50" y2="80" />
          <line x1="85" y1="40" x2="50" y2="80" />
          <line x1="50" y1="40" x2="50" y2="80" />
        </svg>
      </div>
      <div class="title">PARABREACH</div>
      <div class="sub">
        They are coming from the sky. Defend your ground.
      </div>
      <button id="startBtn">Press Start</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
