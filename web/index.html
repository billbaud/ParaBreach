<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ParaBreach</title>
  <meta name="description" content="Retro vector arcade defense game. Defend your ground from troop drops, missiles, and escalating air assaults." />
  <meta name="application-name" content="ParaBreach" />
  <link rel="icon" href="assets/icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ParaBreach">
  <meta name="msapplication-TileColor" content="#000000">
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
  </div>

  <div id="hud">
    <div id="score">SCORE 000000</div>
    <div id="highScore">HI 000000</div>
    <div id="wave">WAVE 1</div>
    <div id="lives">TROOPERS 0</div>
    <div id="version">v.1.25.0</div>
  </div>

  <div id="help">Move pointer/finger to aim. Tap/click/hold to fire.</div>

  <div id="overlay" class="show">
    <div class="panel">
      <div class="splash-graphic">
        <svg viewBox="0 0 100 100" class="parachute">
          <path d="M10 40 C 10 10, 90 10, 90 40" />
          <path d="M10 40 C 30 50, 70 50, 90 40" />
          <line x1="15" y1="40" x2="50" y2="80" />
          <line x1="85" y1="40" x2="50" y2="80" />
          <line x1="50" y1="40" x2="50" y2="80" />
        </svg>
      </div>
      <div class="title">PARABREACH</div>
      <div class="sub">
        They are coming from the sky. Defend your ground.
      </div>
      <button id="startBtn">Press Start</button>
    </div>
  </div>
  <script src="app-meta.js"></script>
  <script src="game.js"></script>
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js", { scope: "./" })
        .then(() => console.log("Service worker registered"))
        .catch(err => console.log("Service worker registration failed:", err));
    });
  }
  </script>
</body>
</html>
